<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="x-ua-compatible" content="IE=Edge" />
    <meta
        name="viewport"
        content="user-scalable=no"
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="@Button501" />
    <meta name="twitter:title" content="マップエディター" />
    <meta name="twitter:description" content="マップ配列を簡単に作成できます。" />
    <meta
        name="twitter:image"
        content="https://sodebutton.github.io/img/favicon.png"
    />
    <link rel="icon" type="image/png" href="../../img/favicon.png" />
    <title>Map Editor</title>
    <style type="text/css" rel="preload">
        body {
            user-select: none;
            -moz-user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            touch-action: none;
            background-color: #333333;
            color: white;
        }

        #main_box {
            display: flex;
        }

        #paint_box {
            margin: 10px;
        }

        #paint_box label {
            display: table-cell;
            font-size: 16px;
            border-radius: 5px;
            border: white solid 3px;
            padding: 5px;
        }

        #paint_box input {
            display: none;
        }

        #paint_box label:checked {
            background-color: dodgerblue;
        }

        #palette_canvas {
            display: block;
            width: 100%;
            margin: 5px 0;
        }

        canvas {
            background-color: white;
        }
    </style>
    <script
        src="https://kit.fontawesome.com/aef5adb27d.js"
        crossorigin="anonymous"
    ></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="./main.js"></script>
</head>
<body>
<div id="main_box">
    <canvas id="main_canvas" width="640" height="640"></canvas>
    <div id="paint_box">
        <input type="checkbox" id="pen_btn">
        <label for="pen_btn"><i class="fas fa-pen"></i></label>
        <input type="checkbox" id="eraser_btn">
        <label for="eraser_btn"><i class="fas fa-eraser"></i></label>
        <input type="checkbox" id="upload_btn">
        <label for="upload_btn"><i class="fas fa-upload"></i></label>
        <canvas id="palette_canvas" width="0" height="0"></canvas>
    </div>
</div>
<div>
    <p>
        <label>map width</label>
        <label>
            <input type="number" id="map_width" value="640">
        </label>
    </p>
    <p>
        <label>map height</label>
        <label>
            <input type="number" id="map_height" value="640">
        </label>
    </p>
    <p>
        <label>map chip</label>
        <label>
            <input type="file" id="map_chip" accept=".png">
        </label>
    </p>
    <p>
        <label>frame size</label>
        <label>
            <input type="number" id="frame_size" value="32">
        </label>
    </p>
    <p>
        <label>auto generation</label>
        <label>
            <select id="auto_generation">
                <option>none</option>
                <option>maze</option>
            </select>
        </label>
    </p>
    <p id="auto_option"></p>
    <p>
        <label>Output</label>
        <label>
            <select id="output_format">
                <option>json file</option>
                <option>text</option>
                <option>image</option>
            </select>
        </label>
        <label>
            <input type="button" id="output_btn" value="Create!">
        </label>
    </p>
    <p id="output_text">
    </p>
</div>
</body>
</html>
